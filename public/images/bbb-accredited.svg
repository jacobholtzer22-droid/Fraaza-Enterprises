    <!-- Torch handle -->
    <rect x="12" y="28" width="4" height="20" rx="1" fill="#FFFFFF"/>
    <rect x="10" y="30" width="8" height="3" rx="1" fill="#FFFFFF"/>
    <rect x="11" y="44" width="6" height="3" rx="1" fill="#FFFFFF"/>
